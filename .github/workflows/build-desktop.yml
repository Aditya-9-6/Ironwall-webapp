name: Build Windows/Mac Desktop App

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Electron App
        shell: cmd
        run: |
          mkdir electron_app
          cd electron_app
          
          # Create app directory and copy files
          mkdir app
          xcopy "..\frontend\*" "app\" /E /I /Y
          
          # Handle HTML redirection for Electron
          ren "app\index.html" "defense_board.html"
          ren "app\demo.html" "index.html"
          
          # Generate package.json using Node (more robust than echo/pkg set)
          echo const fs = require('fs'); > gen_pkg.js
          echo const pkg = { >> gen_pkg.js
          echo   name: 'ironwall-desktop', >> gen_pkg.js
          echo   version: '1.0.0', >> gen_pkg.js
          echo   main: 'main.js', >> gen_pkg.js
          echo   scripts: { build: 'electron-builder --win --x64' }, >> gen_pkg.js
          echo   build: { appId: 'com.ironwall.desktop', productName: 'IronWall Plus Demo', directories: { output: 'dist' } } >> gen_pkg.js
          echo }; >> gen_pkg.js
          echo fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)); >> gen_pkg.js
          node gen_pkg.js
          
          # Create main.js using Node
          echo const fs = require('fs'); > gen_main.js
          echo const code = "const { app, BrowserWindow } = require('electron'); const path = require('path'); function createWindow () { const win = new BrowserWindow({ width: 1920, height: 1080, fullscreen: true, autoHideMenuBar: true, webPreferences: { nodeIntegration: true } }); win.loadFile('app/index.html'); } app.whenReady().then(createWindow);"; >> gen_main.js
          echo fs.writeFileSync('main.js', code); >> gen_main.js
          node gen_main.js
          
          # Install dependencies
          npm install electron electron-builder rimraf

      - name: Build Windows .EXE
        shell: cmd
        run: |
          cd electron_app
          npm run build

      - name: Commit and Push EXE
        shell: cmd
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch
          git pull
          
          # Remove any previous EXEs to avoid duplicates if name changes
          del public_site\*.exe 2>nul || echo "None to delete"
          del frontend\*.exe 2>nul || echo "None to delete"
          
          copy "electron_app\dist\*.exe" "public_site\ironwall-gamethon-desktop.exe"
          copy "electron_app\dist\*.exe" "frontend\ironwall-gamethon-desktop.exe"
          
          git add public_site/ironwall-gamethon-desktop.exe frontend/ironwall-gamethon-desktop.exe
          git commit -m "Auto-generated real Windows Desktop App via GitHub Actions 🤖💻" || echo "No changes to commit"
          git push
