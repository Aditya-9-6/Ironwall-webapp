name: Build Windows/Mac Desktop App

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Electron App
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "electron_app/app"
          
          # Copy frontend files (EXCLUDING node_modules, package files, and binaries)
          # We use Get-ChildItem and Copy-Item for maximum precision on Windows
          Get-ChildItem -Path "frontend" -Exclude "node_modules", "package.json", "package-lock.json", "*.exe", "*.apk" | Copy-Item -Destination "electron_app/app" -Recurse -Force
          
          # Explicitly ensure no package.json exists in the app folder to prevent electron-builder confusion
          if (Test-Path "electron_app/app/package.json") { Remove-Item "electron_app/app/package.json" -Force }
          
          # Handle HTML redirection for Electron
          Copy-Item "electron_app/app/index.html" "electron_app/app/defense_board.html" -Force
          Copy-Item "electron_app/app/unified.html" "electron_app/app/index.html" -Force
          
          cd electron_app
          
          # Generate a pure package.json for electron-builder
          $pkg = @{
            name = "ironwall-desktop"
            version = "1.0.0"
            description = "IronWall+ Next-Gen Defense"
            main = "main.js"
            author = "Aditya-9-6"
            license = "MIT"
            scripts = @{ build = "electron-builder --win --x64 --no-install-rebuild" }
            devDependencies = @{
              electron = "^28.0.0"
              "electron-builder" = "^24.0.0"
            }
            build = @{
              appId = "com.ironwall.desktop"
              productName = "IronWall Plus"
              directories = @{ output = "dist" }
              win = @{ target = "portable" }
              publish = $null
            }
          }
          $pkg | ConvertTo-Json -Depth 10 | Out-File -FilePath "package.json" -Encoding utf8
          
          # Create main.js
          $code = @"
          const { app, BrowserWindow } = require('electron');
          const path = require('path');
          function createWindow () {
            const win = new BrowserWindow({
              width: 1920,
              height: 1080,
              fullscreen: true,
              autoHideMenuBar: true,
              webPreferences: { nodeIntegration: true, contextIsolation: false }
            });
            win.loadFile('app/index.html');
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          "@
          $code | Out-File -FilePath "main.js" -Encoding utf8
          
          # Install dependencies with explicit timeout prevention
          npm install --save-dev electron electron-builder

      - name: Build Windows .EXE
        shell: cmd
        run: |
          cd electron_app
          npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            electron_app/dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and Upload Asset (Optional but better for naming)
        shell: cmd
        run: |
          cd electron_app/dist
          ren *.exe ironwall-gamethon-desktop.exe
          
      - name: Update Latest Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: electron_app/dist/ironwall-gamethon-desktop.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
